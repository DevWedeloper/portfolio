<ul class="tabs">
  @for (tab of tabsList(); track $index) {
    <li
      #tabLinks
      class="tab-links"
      [ngClass]="activatedTab === tab ? 'active' : ''"
      (click)="setTab($event, tab)"
      (keydown.Enter)="setTab($event, tab)"
      tabindex="0"
    >
      <p>{{ tab }}</p>
    </li>
  }
  <li #line class="tab-line"></li>
</ul>
