<ul class="tabs">
  <li
    #tabLinks
    class="tab-links"
    *ngFor="let tab of tabsList"
    [ngClass]="activatedTab === tab ? 'active' : ''"
    (click)="setTab($event, tab)"
    (keydown.Enter)="setTab($event, tab)"
    tabindex="0"
  >
    <p>{{ tab }}</p>
  </li>
  <div #line class="tab-line"></div>
</ul>
