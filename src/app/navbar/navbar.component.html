<nav class="navbar">
  <h1>Nathan.</h1>
  <div class="navbar-mobile">
    <a class="icon-link" (click)="themeOnClick()">
      <img
        class="theme-icon theme-icon-menu"
        src="{{ isDarkMode() ? 'assets/sun.svg' : 'assets/moon.svg' }}"
    /></a>
    <a
      class="icon-link icon"
      (click)="menuOnClick()"
      [ngStyle]="{
        filter: isDarkMode() ? 'invert(100%) grayscale(100%)' : 'grayscale(100%)'
      }"
    >
      <img
        id="menu-icon"
        src="{{ this.isMenuOpen ? 'assets/close.png' : 'assets/menu.png' }}"
    /></a>
  </div>
  <ul [ngStyle]="{ transform: isMenuOpen? 'translateX(0)': '' }">
    <li><a #homeLink href="#home" class="active" (click)="closeMenu()">Home</a></li>
    <li><a #aboutLink href="#about" (click)="closeMenu()">About</a></li>
    <li><a #contactLink href="#contact" (click)="closeMenu()">Contact</a></li>
    <li>
      <a class="icon-link" (click)="themeOnClick()">
        <img
          class="theme-icon"
          id="theme-icon"
          src="{{ isDarkMode() ? 'assets/sun.svg' : 'assets/moon.svg' }}"
        />
      </a>
    </li>
  </ul>
</nav>
