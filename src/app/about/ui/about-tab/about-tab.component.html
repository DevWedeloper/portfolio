<div class="tab-container">
  <app-tabs [tabsList]="tabs" (tabChange)="tabChange($event)"></app-tabs>
  <div
    [ngStyle]="{ display: activatedTab === 'Skills' ? 'block' : 'none' }"
    appHighlightText
  >
    <ul class="skills-content tab-content">
      <li class="skills-item">Front-End:</li>
      <li class="skills-item">
        <span appTooltip tooltipText="HTML">
          <img
            class="icon"
            src="assets/images/icons/html.svg"
            alt="HTML Logo"
            loading="lazy"
          />
        </span>
        <span appTooltip tooltipText="CSS">
          <img
            class="icon"
            src="assets/images/icons/css.svg"
            alt="CSS Logo"
            loading="lazy"
          />
        </span>
        <span appTooltip tooltipText="JavaScript">
          <img
            class="icon"
            src="assets/images/icons/javascript.svg"
            alt="JavaScript Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="Angular">
          <img
            class="icon"
            src="assets/images/icons/angular.svg"
            alt="Angular Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="TypeScript">
          <img
            class="icon"
            src="assets/images/icons/typescript.svg"
            alt="TypeScript Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="SASS">
          <img
            class="icon"
            src="assets/images/icons/sass.svg"
            alt="SASS Logo"
            loading="lazy"
        /></span>
      </li>
      <li class="skills-item">Back-End:</li>
      <li class="skills-item">
        <span appTooltip tooltipText="MongoDB">
          <img
            class="icon"
            src="assets/images/icons/mongodb.svg"
            alt="MongoDB Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="Express.js">
          <img
            class="icon"
            src="assets/images/icons/express-js.svg"
            alt="Express.js Logo"
            loading="lazy"
            [ngStyle]="{
              filter:
                (ts.isDarkMode$ | async)
                  ? 'invert(100%) grayscale(100%)'
                  : 'grayscale(100%)'
            }"
        /></span>
        <span appTooltip tooltipText="Node.js">
          <img
            class="icon"
            src="assets/images/icons/node-js.svg"
            alt="Node.js Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="Laravel">
          <img
            class="icon"
            src="assets/images/icons/laravel.svg"
            alt="Laravel Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="Lumen">
          <img
            class="icon"
            src="assets/images/icons/lumen.svg"
            alt="Lumen Logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="Python">
          <img
            class="icon"
            src="assets/images/icons/python.svg"
            alt="Python Logo"
            loading="lazy"
        /></span>
      </li>
      <li class="skills-item">Tools:</li>
      <li class="skills-item">
        <span appTooltip tooltipText="Git">
          <img
            class="icon"
            src="assets/images/icons/git.svg"
            alt="Git logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="GitHub">
          <img
            class="icon"
            src="{{
              (ts.isDarkMode$ | async)
                ? 'assets/images/icons/github-light.svg'
                : 'assets/images/icons/github-dark.svg'
            }}"
            alt="GitHub logo"
        /></span>
        <span appTooltip tooltipText="Jira">
          <img
            class="icon"
            src="assets/images/icons/jira.svg"
            alt="Jira logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="RxJS">
          <img
            class="icon"
            src="assets/images/icons/rxjs.svg"
            alt="RxJS logo"
            loading="lazy"
        /></span>
      </li>
      <li class="skills-item">Technologies:</li>
      <li class="skills-item">
        <span appTooltip tooltipText="AWS">
          <img
            class="icon"
            src="{{
              (ts.isDarkMode$ | async)
                ? 'assets/images/icons/aws-light.svg'
                : 'assets/images/icons/aws-dark.svg'
            }}"
            alt="AWS logo"
            loading="lazy"
        /></span>
        <span appTooltip tooltipText="Rest API">
          <img
            class="icon"
            src="assets/images/icons/rest-api.svg"
            alt="Rest API logo"
            loading="lazy"
            [ngStyle]="{
              filter:
                (ts.isDarkMode$ | async)
                  ? 'invert(100%) grayscale(100%)'
                  : 'grayscale(100%)'
            }"
        /></span>
      </li>
    </ul>
  </div>
  <div
    [ngStyle]="{
      display: activatedTab === 'Experience' ? 'block' : 'none'
    }"
  >
    <ul class="experience-content tab-content">
      <li>
        <span appHighlightText>2023 Feb - 2023 May</span>
      </li>
      <li>
        <span>Internship at Cloudstaff</span>
        <span class="superscript-container">
          <img
            class="icon icon-size-adjust superscript-icon"
            src="assets/images/icons/open-in-new.svg"
            alt="Open In New Icon"
            (click)="ms.open(cloudstaffInternship)"
            (keydown.Enter)="ms.open(cloudstaffInternship)"
            tabindex="0"
            loading="lazy"
            [ngStyle]="{
              filter:
                (ts.isDarkMode$ | async)
                  ? 'invert(100%) grayscale(100%)'
                  : 'grayscale(100%)'
            }"
          />
        </span>
      </li>
    </ul>
  </div>
  <div [ngStyle]="{ display: activatedTab === 'Education' ? 'block' : 'none' }">
    <ul class="education-content tab-content">
      <li><span appHighlightText>2019 - 2023</span></li>
      <li>
        <span
          >Bachelor of Science in Computer Science at Holy Angel
          University</span
        >
      </li>
    </ul>
  </div>
</div>

<ng-template #cloudstaffInternship>
  <app-cloudstaff-internship/>
</ng-template>
