<!doctype html>
<html lang="en">
  <head>
    <script>
      var preferredTheme = localStorage.getItem("preferredTheme");
      var isSystemThemeDark = matchMedia("(prefers-color-scheme: dark)").matches;
      const isDarkTheme =
        preferredTheme === "dark" ||
        (preferredTheme === null && isSystemThemeDark);
      if (isDarkTheme) {
        document.documentElement.classList.add(isDarkTheme ? "dark-theme" : "light-theme");
      }
    </script>
